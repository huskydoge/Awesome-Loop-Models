name: Build generated repo artifacts

on:
  push:
    branches: [main]
    paths:
      - "papers/**"
      - "blogs/**"
      - "scripts/build.py"
      - "scripts/fetch_metrics.py"
      - "scripts/README_HEADER.md"
      - "scripts/README_FOOTER.md"
      - "submit.html"
      - "tests/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "papers/**"
      - "blogs/**"
      - "scripts/build.py"
      - "scripts/fetch_metrics.py"
      - "scripts/README_HEADER.md"
      - "scripts/README_FOOTER.md"
      - "submit.html"
      - "tests/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate YAML files
        run: |
          python3 - << 'EOF'
          from scripts import build

          papers = build.load_papers()
          blogs = build.load_blogs()
          print(f"Validated {len(papers)} paper YAML files and {len(blogs)} blog YAML files")
          EOF

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -t . -p 'test_*.py'

      - name: Build papers.json, README.md, and TAGS.md
        run: python3 scripts/build.py

      - name: Commit generated files (on push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f papers.json README.md TAGS.md
          git diff --cached --quiet || git commit -m "chore: rebuild papers.json + README.md + TAGS.md [skip ci]"
          git push
