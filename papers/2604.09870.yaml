desc: Probes frozen Ouro loop states with lightweight evaluators on HH-RLHF, finding
  that preference labels are primarily decodable from pairwise state differences;
  the authors frame this as an internal-consistency probe of Ouro's learned value
  organization rather than direct prediction of noisy human annotations.
