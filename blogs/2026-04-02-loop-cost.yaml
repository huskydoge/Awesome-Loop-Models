desc: >
  Builds a clean cost-ablation chain for loop-model training, comparing
  shared versus non-shared weights, per-step losses, detach, instant
  updates, internal truncation, and gradient checkpointing, then checks the
  resulting FLOPs and memory trade-offs with a toy benchmark.

